[package]
name = "franka-demo"
description = "Minimum viable Isaac-Sim-style demo: load franka.usd into a gearbox-physics Sim, render via Bevy + usd_bevy, reconcile poses each frame."
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "franka-demo"
path = "src/main.rs"

[dependencies]
gearbox-physics.workspace = true
gearbox-usd = { path = "../../crates/gearbox-usd" }
rapier3d.workspace = true

bevy.workspace = true
# Visual side from the new bevy_openusd workspace (3-crate split).
# Path-dep into the sibling repo while we're co-developing.
usd_bevy = { path = "../../../../other/OUSD/bevy_openusd/crates/usd_bevy" }

anyhow = "1"
