[package]
name = "franka-demo"
description = "Load a USD into a Bevy app with usd_bevy + its RapierAdapterPlugin. Gearbox provides the world layer (ground, sky); usd_bevy handles USD physics + visuals."
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "franka-demo"
path = "src/main.rs"

[dependencies]
rapier3d.workspace = true
bevy.workspace = true
# Both UsdPlugin (loader + scene projection) and the RapierAdapterPlugin
# (USD physics → its own PhysicsWorld) come from this single crate.
usd_bevy = { path = "../../../../other/OUSD/bevy_openusd/crates/usd_bevy" }
