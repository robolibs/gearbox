[package]
name = "gearbox"
description = "gearbox — USD-driven robot/scene editor. Same world / camera / UI as `gearbox_old` but with `Load USD…` + transform gizmos instead of programmatic vehicle presets."
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "gearbox"
path = "src/main.rs"

[dependencies]
gearbox-core.workspace = true
gearbox-physics.workspace = true
gearbox-viz.workspace = true
gearbox-editor.workspace = true
gearbox-api.workspace = true
datapod.workspace = true
bevy.workspace = true
bevy_egui.workspace = true
bevy_glacial.workspace = true
usd_bevy.workspace = true
# Native file dialog for the "Load USD…" button.
rfd = "0.15"
