[package]
name = "usd-world-demo"
description = "Load one or more USD assets into a gearbox-shaped Bevy app. World comes from gearbox-world; USD physics + visuals from usd_bevy."
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "usd-world-demo"
path = "src/main.rs"

[dependencies]
bevy.workspace = true
bevy_egui.workspace = true
bevy_frost.workspace = true
gearbox-world = { path = "../../crates/gearbox-world" }
# Both UsdPlugin (loader + scene projection) and the RapierAdapterPlugin
# (USD physics → its own PhysicsWorld) come from this single crate.
usd_bevy = { path = "../../../../other/OUSD/bevy_openusd/crates/usd_bevy" }
