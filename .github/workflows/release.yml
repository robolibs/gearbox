name: release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: gearbox-linux-x86_64.tar.gz
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            asset: gearbox-macos-x86_64.tar.gz
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            asset: gearbox-macos-aarch64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libvulkan-dev \
            libx11-dev \
            libxcb1-dev \
            libxshmfence-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build gearbox binary
        run: make build-release-bin CARGO_ENV=cargo TARGET=${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          binary="target/${{ matrix.target }}/release/gearbox"
          package_dir="dist/package"

          mkdir -p "${package_dir}"
          cp "${binary}" "${package_dir}/gearbox"
          chmod +x "${package_dir}/gearbox"
          strip "${package_dir}/gearbox" || true

          cat > "${package_dir}/README.txt" <<'EOF'
          gearbox release binary

          Run:
            ./gearbox
          EOF

          tar -C "${package_dir}" -czf "dist/${{ matrix.asset }}" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
