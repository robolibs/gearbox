[package]
name = "usd_bevy"
version = "0.0.1"
edition = "2024"
license = "MIT"
description = "Bevy plugin: USD asset loader, scene projection, and Rapier physics adapter wrapping `usd_rapier`."
repository = "https://github.com/bresilla/bevy_openusd"

[dependencies]
openusd = { git = "https://github.com/mxpv/openusd", rev = "fe92b73224c611831be244afac9cf7654b5ef51e", features = ["physics"] }
usd_schema = { path = "../usd_schema" }
usd_rapier = { path = "../usd_rapier" }
rapier3d-f64 = "0.32"
glam = "0.30"
anyhow = "1"
thiserror = "2"
log = "0.4"
serde = { version = "1", features = ["derive"] }
zip = { version = "8", default-features = false, features = ["deflate"] }
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
bevy = { version = "0.19", default-features = false, features = [
    "std",
    "async_executor",
    "multi_threaded",
    "bevy_asset",
    "bevy_log",
    "bevy_window",
    "bevy_render",
    "bevy_core_pipeline",
    "bevy_pbr",
    "bevy_light",
    "bevy_mesh",
    "bevy_camera",
    "bevy_image",
    "bevy_scene",
    "bevy_gizmos",
    "bevy_gizmos_render",
    "bevy_post_process",
    "morph",
    "png",
    "jpeg",
    "bmp",
    "tga",
    "hdr",
    "webp",
    "tiff",
    "ktx2",
    "zstd_rust",
    "reflect_auto_register",
] }

[dev-dependencies]
image = { version = "0.25", default-features = false, features = ["png"] }
